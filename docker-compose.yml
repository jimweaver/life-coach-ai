version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-coach-api
    ports:
      - "${PORT:-8787}:8787"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8787
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - DOMAIN_MODEL_ADAPTER_MODE=${DOMAIN_MODEL_ADAPTER_MODE:-auto}
      - RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-redis}
      - CRON_EVENT_DELIVERY_MODE=${CRON_EVENT_DELIVERY_MODE:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - life-coach-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: life-coach-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-lifecoach}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-lifecoach}
      - POSTGRES_DB=${DB_NAME:-life_coach}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - life-coach-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifecoach} -d ${DB_NAME:-life_coach}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: life-coach-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - life-coach-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  life-coach-network:
    driver: bridge
