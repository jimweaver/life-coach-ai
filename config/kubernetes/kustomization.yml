apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: life-coach

resources:
  - 00-namespace.yml
  - 01-configmap.yml
  - 02-secrets.yml
  - 03-postgres.yml
  - 04-redis.yml
  - 05-api.yml
  - 06-hpa.yml
  - 07-pdb.yml
  - 08-network-policy.yml

commonLabels:
  app.kubernetes.io/name: life-coach-ai
  app.kubernetes.io/version: "1.0"
  app.kubernetes.io/managed-by: kubectl

images:
  - name: jimweaver/life-coach-ai
    newTag: latest

