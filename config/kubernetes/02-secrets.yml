apiVersion: v1
kind: Secret
metadata:
  name: life-coach-secrets
  namespace: life-coach
type: Opaque
stringData:
  # Replace with your actual secrets
  # kubectl create secret generic life-coach-secrets \
  #   --from-literal=database-url="postgresql://..." \
  #   --from-literal=openai-api-key="sk-..." \
  #   --from-literal=brave-api-key="..." \
  #   -n life-coach
  
  # Placeholder values - MUST be replaced before deployment
  DATABASE_URL: "postgresql://user:password@postgres:5432/life_coach"
