apiVersion: apps/v1
kind: Deployment
metadata:
  name: life-coach-api
  namespace: life-coach
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: life-coach-api
  template:
    metadata:
      labels:
        app: life-coach-api
    spec:
      containers:
        - name: api
          image: jimweaver/life-coach-ai:latest
          ports:
            - containerPort: 8787
              name: http
          envFrom:
            - configMapRef:
                name: life-coach-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: life-coach-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: life-coach-secrets
                  key: OPENAI_API_KEY
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: life-coach-secrets
                  key: BRAVE_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: life-coach-api
  namespace: life-coach
spec:
  selector:
    app: life-coach-api
  ports:
    - port: 80
      targetPort: 8787
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: life-coach-api
  namespace: life-coach
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.life-coach.example.com
      secretName: life-coach-api-tls
  rules:
    - host: api.life-coach.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: life-coach-api
                port:
                  number: 80
